version: '3.8'

services:
  binance-data-mcp:
    build: .
    container_name: binance-data-mcp-server
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - STAGE=${STAGE:-MAINNET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVER_ADDRESS=${SERVER_ADDRESS:-}
      - MCP_OPERATOR_PRIVATE_KEY=${MCP_OPERATOR_PRIVATE_KEY:-}
      - MCP_OPERATOR_ADDRESS=${MCP_OPERATOR_ADDRESS:-}
      - D402_FACILITATOR_URL=${D402_FACILITATOR_URL:-https://facilitator.d402.net}
      - D402_FACILITATOR_API_KEY=${D402_FACILITATOR_API_KEY:-}
      - D402_TESTING_MODE=${D402_TESTING_MODE:-true}
      - D402_FREE_ACCESS=${D402_FREE_ACCESS:-true}
      - DEFAULT_SETTLEMENT_TOKEN=${DEFAULT_SETTLEMENT_TOKEN:-0xaf88d065e77c8cC2239327C5EDb3A432268e5831}
      - DEFAULT_SETTLEMENT_NETWORK=${DEFAULT_SETTLEMENT_NETWORK:-arbitrum_one}
      - NETWORK=${NETWORK:-arbitrum_one}
      - ARBITRUM_ONE_RPC_URL=${ARBITRUM_ONE_RPC_URL:-}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3